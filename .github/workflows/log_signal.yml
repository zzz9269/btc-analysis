name: Log 72h Bias Signal

on:
  schedule:
    # Every 5 min. Repo is public → unlimited Actions minutes, no budget cap.
    # GitHub may still delay/skip individual scheduled runs by 1-5 min under
    # peak load, but losing a tick here and there is fine — the dashboard
    # reads the latest row and the 72h-resolution job catches up next tick.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    concurrency:
      group: log-signal
      cancel-in-progress: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install slim runtime deps
        # log_signal.py stubs streamlit/streamlit_autorefresh before importing
        # btc_analysis_app.py, so we skip those (~30s saved per run). Everything
        # btc_analysis_app.py imports at module load — numpy, pandas, matplotlib,
        # scipy, yfinance — MUST be installed or the module load fails.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "numpy==2.3.4" \
            "pandas==2.3.3" \
            "matplotlib==3.10.6" \
            "scipy==1.16.3" \
            "yfinance==1.1.0"

      - name: Run signal logger
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python log_signal.py
