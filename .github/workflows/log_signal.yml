name: Log 72h Bias Signal

# Triggered externally by cron-job.org POSTing to GitHub's repository_dispatch
# endpoint every 5 minutes. This bypasses GitHub's scheduled-workflow throttling,
# which was producing multi-hour overnight gaps when we used `on: schedule`.
# repository_dispatch is a webhook event, not a scheduled event, so GitHub
# fires it immediately on receipt instead of putting it through the throttled
# scheduler queue.
#
# To run manually: Actions tab → Log 72h Bias Signal → Run workflow.
# External cron setup steps are in the chat / commit message — POST to
#   https://api.github.com/repos/zzz9269/btc-analysis/dispatches
# with body  {"event_type": "log-signal"}  and a fine-grained PAT.

on:
  repository_dispatch:
    types: [log-signal]
  workflow_dispatch: {}

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install slim runtime deps
        # log_signal.py stubs streamlit/streamlit_autorefresh before importing
        # btc_analysis_app.py, so we skip those.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "numpy==2.3.4" \
            "pandas==2.3.3" \
            "matplotlib==3.10.6" \
            "scipy==1.16.3" \
            "yfinance==1.1.0"

      - name: Run signal logger
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python log_signal.py
